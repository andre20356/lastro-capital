<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lastro Capital</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0f1e;
      color: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    .pix-badge {
      display: inline-block;
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 0.3px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #f0f4ff;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    footer {
      margin-top: 48px;
      font-size: 0.78rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LC</div>
    <h1>Lastro Capital</h1>
    <p class="tagline">Plataforma de investimentos inteligentes</p>
    <span class="pix-badge">Sistema com pagamento via PIX</span>

    <div class="actions">
      <button class="btn btn-primary" onclick="alert('Entrar — em breve!')">Entrar</button>
      <button class="btn btn-secondary" onclick="alert('Criar Conta — em breve!')">Criar Conta</button>
    </div>

    <footer>&copy; 2025 Lastro Capital. Todos os direitos reservados.</footer>
  </div>
</body>
</html>
